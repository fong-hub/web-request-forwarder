name: Bug report
description: Report a problem in Request Forwarder
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: Describe the issue clearly
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction path
      placeholder: |
        1. Open ...
        2. Enable ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser version, extension version, OS, and related context
      placeholder: Chrome 136 / macOS / Request Forwarder 0.0.2

